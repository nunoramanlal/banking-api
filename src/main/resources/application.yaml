spring:
  application:
    name: banking-api
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bankingdb}
    username: ${SPRING_DATASOURCE_USERNAME:banking}
    password: ${SPRING_DATASOURCE_PASSWORD:banking}
    hikari:
      connection-timeout: 5000
      validation-timeout: 3000
      max-lifetime: 1800000
      idle-timeout: 600000
      maximum-pool-size: 20
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-characters-long}
    access-token-expiry: PT15M
    refresh-token-expiry: P7D
    cleanup-cron: "0 0 * * * *"   # every hour