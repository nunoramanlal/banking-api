spring:
  application:
    name: banking-api
  datasource:
    driverClassName: org.h2.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:bankingdb}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:pwd}
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-characters-long}
    access-token-expiry: PT15M
    refresh-token-expiry: P7D
    cleanup-cron: "0 0 * * * *"   # every hour