name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make scripts executable
        run: chmod +x src/test/resources/docker/*.sh

      - name: Start Postgres
        run: ./src/test/resources/docker/dockerStart.sh

      - name: Build and test
        run: ./mvnw --batch-mode verify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/

      - name: Stop Postgres
        if: always()
        run: ./src/test/resources/docker/dockerShutdown.sh